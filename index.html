<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>傑克的 3 首精選音樂</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --wood: #8b5a2b;
            --leaf: #6eb77e;
            --sky: #7bb5ce;
            --paper: #fcf9f2;
        }

        body {
            background: linear-gradient(135deg, #e8dcb8, var(--sky));
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Microsoft JhengHei', sans-serif;
        }

        .player-card {
            background: var(--paper);
            width: 320px;
            padding: 25px;
            border: 10px solid var(--wood);
            border-radius: 35px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 { color: var(--wood); margin-top: 0; font-size: 24px; }

        .cover {
            width: 120px;
            height: 120px;
            background: var(--sky);
            margin: 0 auto 20px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            color: white;
            transition: transform 0.5s;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.1);
        }

        /* 旋轉動畫 */
        .playing .cover {
            animation: rotate 8s linear infinite;
        }
        @keyframes rotate { from {transform: rotate(0deg);} to {transform: rotate(360deg);} }

        .track-info { margin-bottom: 15px; font-weight: bold; color: #555; height: 1.2em; }

        .progress-box {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            margin-bottom: 20px;
            color: var(--wood);
        }
        input[type="range"] { flex: 1; cursor: pointer; accent-color: var(--leaf); }

        .controls {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 20px;
        }
        .btn {
            background: none; border: none;
            color: var(--wood);
            font-size: 24px; cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.1); }
        .btn.play { font-size: 55px; color: var(--leaf); }

        .playlist {
            text-align: left;
            list-style: none;
            padding: 0;
            border-top: 2px solid #ddd;
            margin-top: 10px;
        }
        .playlist li {
            padding: 12px 10px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            color: #666;
        }
        .playlist li i { margin-right: 10px; font-size: 12px; visibility: hidden; }
        .playlist li.active {
            background: #e0f2e9;
            color: var(--leaf);
            font-weight: bold;
        }
        .playlist li.active i { visibility: visible; }
    </style>
</head>
<body>

<div class="player-card" id="player-container">
    <h2><i class="fas fa-leaf"></i> 傑克精選</h2>
    
    <div class="cover" id="visual-cover">
        <i class="fas fa-music"></i>
    </div>

    <div class="track-info" id="track-name">載入中...</div>

    <div class="progress-box">
        <span id="time-curr">0:00</span>
        <input type="range" id="seek-bar" value="0" min="0" step="1">
        <span id="time-total">0:00</span>
    </div>

    <div class="controls">
        <button class="btn" onclick="prevTrack()"><i class="fas fa-backward"></i></button>
        <button class="btn play" id="play-btn" onclick="togglePlay()"><i class="fas fa-play-circle"></i></button>
        <button class="btn" onclick="nextTrack()"><i class="fas fa-forward"></i></button>
    </div>

    <ul class="playlist">
        <li id="item-0" onclick="selectTrack(0)"><i class="fas fa-play"></i> 01. Song 1</li>
        <li id="item-1" onclick="selectTrack(1)"><i class="fas fa-play"></i> 02. Song 2</li>
        <li id="item-2" onclick="selectTrack(2)"><i class="fas fa-play"></i> 03. Song 3</li>
    </ul>
</div>

<audio id="main-audio" crossorigin="anonymous"></audio>

<script>
    // 使用 GitHub Raw 連結，確保播放器能正確抓取
    const tracks = [
        { name: "Song 1", url: "https://raw.githubusercontent.com/Lucas-1103/MP3/main/song1.mp3" },
        { name: "Song 2", url: "https://raw.githubusercontent.com/Lucas-1103/MP3/main/song2.mp3" },
        { name: "Song 3", url: "https://raw.githubusercontent.com/Lucas-1103/MP3/main/song3.mp3" }
    ];

    const audio = document.getElementById('main-audio');
    const playBtn = document.getElementById('play-btn');
    const trackName = document.getElementById('track-name');
    const seekBar = document.getElementById('seek-bar');
    const container = document.getElementById('player-container');
    
    let index = 0;
    let isPlaying = false;

    // 初始化載入
    function loadTrack(i) {
        index = i;
        audio.src = tracks[index].url;
        trackName.innerText = tracks[index].name;
        
        // 更新 UI 狀態
        for(let n=0; n<tracks.length; n++) {
            document.getElementById(`item-${n}`).classList.toggle('active', n === i);
        }
    }

    function togglePlay() {
        if (isPlaying) {
            audio.pause();
        } else {
            audio.play().catch(e => {
                console.error("播放被攔截:", e);
                alert("點擊後即可開始播放！");
            });
        }
    }

    audio.onplay = () => {
        isPlaying = true;
        playBtn.innerHTML = '<i class="fas fa-pause-circle"></i>';
        container.classList.add('playing');
    };

    audio.onpause = () => {
        isPlaying = false;
        playBtn.innerHTML = '<i class="fas fa-play-circle"></i>';
        container.classList.remove('playing');
    };

    function nextTrack() {
        index = (index + 1) % tracks.length;
        loadTrack(index);
        audio.play();
    }

    function prevTrack() {
        index = (index - 1 + tracks.length) % tracks.length;
        loadTrack(index);
        audio.play();
    }

    function selectTrack(i) {
        loadTrack(i);
        audio.play();
    }

    // 更新進度條
    audio.ontimeupdate = () => {
        if (!isNaN(audio.duration)) {
            seekBar.max = audio.duration;
            seekBar.value = audio.currentTime;
            document.getElementById('time-curr').innerText = formatTime(audio.currentTime);
            document.getElementById('time-total').innerText = formatTime(audio.duration);
        }
    };

    // 拖動進度條
    seekBar.oninput = () => audio.currentTime = seekBar.value;

    // 自動下一首
    audio.onended = () => nextTrack();

    // 時間格式化 (0:00)
    function formatTime(secs) {
        let m = Math.floor(secs / 60);
        let s = Math.floor(secs % 60);
        return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    // 啟動首曲
    loadTrack(0);

</script>
</body>
</html>
